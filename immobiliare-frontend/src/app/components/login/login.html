<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body p-4">
          <h3 class="card-title text-center mb-4">
            <i class="bi bi-lock-fill"></i> Accedi
          </h3>
          @if (errore) {
            <div class="position-fixed top-0 start-50 translate-middle-x mt-3"
                 style="z-index: 9999; min-width: 350px;">
              <div class="alert alert-danger shadow">
                <i class="bi bi-exclamation-circle-fill me-2"></i>{{ errore }}
              </div>
            </div>
          }
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="email"
                   placeholder="La tua email"
                   (keyup.enter)="login()">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <input [type]="mostraPassword ? 'text' : 'password'"
                     class="form-control"
                     [(ngModel)]="password"
                     placeholder="La tua password"
                     (keyup.enter)="login()">
              <button class="btn btn-outline-secondary" type="button"
                      (click)="mostraPassword = !mostraPassword">
                <i [class]="mostraPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </button>
            </div>
            <div class="text-end mt-1">
              <a routerLink="/recupera-password" class="text-muted small">
                Password dimenticata?
              </a>
            </div>
          </div>
          <button class="btn btn-dark w-100" (click)="login()">Accedi</button>
          <p class="text-center mt-3">
            Non hai un account? <a routerLink="/registrazione">Registrati</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
