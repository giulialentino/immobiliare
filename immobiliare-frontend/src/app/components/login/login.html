<div style="padding: 40px 36px 32px;">

  <h3 style="font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; color:#111318; text-align:center; margin-bottom:6px;">
    Chi si rivede!
  </h3>
  <p style="font-size:14px; color:#8a919e; text-align:center; margin-bottom:12px;">
    Accedi al tuo account
  </p>
  <div style="width:36px; height:3px; background:#b5001a; border-radius:2px; margin:0 auto 28px;"></div>

  @if (errore) {
    <div class="alert alert-danger d-flex align-items-center gap-2 mb-3">
      <i class="bi bi-exclamation-circle-fill"></i>
      <strong>{{ errore }}</strong>
    </div>
  }

  <div class="mb-3">
    <label class="form-label" style="font-size:12px; font-weight:600; color:#4a5260; letter-spacing:0.06em; text-transform:uppercase;">Email</label>
    <input type="email" class="form-control" [(ngModel)]="email"
           placeholder="La tua email" (keyup.enter)="login()">
  </div>

  <div class="mb-3">
    <label class="form-label" style="font-size:12px; font-weight:600; color:#4a5260; letter-spacing:0.06em; text-transform:uppercase;">Password</label>
    <div class="input-group">
      <input [type]="mostraPassword ? 'text' : 'password'"
             class="form-control" [(ngModel)]="password"
             placeholder="La tua password" (keyup.enter)="login()">
      <button class="btn btn-outline-secondary" type="button"
              (click)="mostraPassword = !mostraPassword">
        <i [class]="mostraPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
      </button>
    </div>
    <div class="text-end mt-2">
      <a routerLink="/recupera-password" style="font-size:12px; color:#8a919e; text-decoration:none;">
        Password dimenticata?
      </a>
    </div>
  </div>

  <button (click)="login()" style="width:100%; background:#111318; color:white; border:none; border-radius:10px; padding:14px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:8px;">
    Accedi
  </button>

  <p style="font-size:14px; color:#8a919e; text-align:center; margin-top:20px; margin-bottom:0;">
    Non hai un account?
    <a routerLink="/registrazione" style="color:#b5001a; font-weight:600; text-decoration:none;">Registrati</a>
  </p>

</div>
